interface:
  display_name: "Code Review"
  short_description: "统一代码审查：通用7维 + 金融专项 + 自动修复。"
  trigger_words: ["review", "审查代码", "code review", "review PR", "review diff", "金融审查", "fin review", "simplify", "简化代码", "审查交易代码", "审查支付代码"]
  default_prompt: "Use $code-review to review the current diff. Use --fin for financial code or --fix to auto-apply fixes."

agents:
  - role: "scanner"
    model: "haiku"
    description: "Quick scan via grep patterns. Fast, deterministic pattern matching."

  - role: "reviewer"
    model: "sonnet"
    description: "Deep review across 7 dimensions. Reasoning-heavy analysis."

  - role: "fin-reviewer"
    model: "sonnet"
    description: "Financial-specific review: data integrity, transaction flow, compliance. Loads references/fin-review.md."

  - role: "fixer"
    model: "sonnet"
    description: "Applies review findings as code fixes. Loads references/simplify-guide.md. Verifies behavior preservation."

workflow:
  - step: "locate"
    agent: null
    output: "language + scope + complexity + mode"

  - step: "quick-scan"
    agent: "scanner"
    output: "grep hits per dimension"

  - step: "deep-review"
    agent: "reviewer"
    condition: "Review or Fix mode"
    output: "7-dimension findings"

  - step: "fin-review"
    agent: "fin-reviewer"
    condition: "Fin mode"
    output: "P1-data + P2-flow + P3-compliance findings"

  - step: "report"
    agent: null
    output: "structured report P0-P3"

  - step: "fix"
    agent: "fixer"
    condition: "Fix mode"
    output: "applied fixes with verification"
