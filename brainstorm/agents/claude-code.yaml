interface:
  display_name: "Brainstorm"
  short_description: "Structured brainstorming: DIGGING → INCUBATING → CONVERGING."
  trigger_words: ["头脑风暴", "brainstorm", "碰撞", "发散", "创意", "想法", "帮我想想"]
  default_prompt: "Use $brainstorm to dig into the real problem and generate creative solutions."

# 子 Agent：实际用 Claude Code 内置（general-purpose/Explore）或全局 ~/.claude/agents/ 已注册的（如 brainstorm-collider/oracle/evolver-*）

  - role: "novel-enhancer"
    model: "sonnet"
    description: "Activates novel-writing domain techniques for creative fiction requests. Uses novel-brainstorm.md."

workflow:
  - step: "digging"
    agent: null
    description: "Deep-dive into real problem. Input validation + clarify with user."

  - step: "incubating"
    agent: null  # 设计意图，实际由主 agent 用 general-purpose 执行
    output: "cross-domain stimulus + collision results"

  - step: "converging"
    agent: null
    description: "Filter, rank, select. User correction mechanism active."

  - step: "novel-boost"
    agent: null  # 设计意图，实际由主 agent 用 general-purpose 执行
    condition: "fiction/creative writing request"
    output: "domain-specific ideation"
