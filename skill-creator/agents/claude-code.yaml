interface:
  display_name: "Skill Creator"
  short_description: "Command-driven skill factory with sub-agent orchestration and enforced validation."
  trigger_words: ["create skill", "new skill", "写个 skill", "创建 skill", "skill 模板", "新建 skill", "update skill", "validate skill", "init skill"]
  default_prompt: "Use $skill-creator to create or update a skill following the standard directory structure."

# 子 Agent：实际用 Claude Code 内置（general-purpose/Explore）或全局 ~/.claude/agents/ 已注册的（如 brainstorm-collider/oracle/evolver-*）

  - role: "writer"
    model: "sonnet"
    description: "SKILL.md content writing, README.md, references/ content. Requires creative reasoning."

  - role: "validator"
    model: "haiku"
    description: "quick_validate.py execution, structure completeness check. Deterministic verification."

workflow:
  - step: "init"
    agent: null
    description: "Run init_skill.py script (mandatory)"
    output: "directory with templates"

  - step: "architect"
    agent: null  # 设计意图，实际由主 agent 用 general-purpose 执行
    output: "frontmatter + directory layout + agents/ config"

  - step: "draft"
    agent: null  # 设计意图，实际由主 agent 用 general-purpose 执行
    output: "SKILL.md body + README.md + references/"

  - step: "validate"
    agent: null  # 设计意图，实际由主 agent 用 general-purpose 执行
    output: "validation results + completeness check"

  - step: "package"
    agent: null
    description: "Run package_skill.py (optional, only when requested)"

scripts:
  init: "scripts/init_skill.py"
  validate: "scripts/quick_validate.py"
  package: "scripts/package_skill.py"
